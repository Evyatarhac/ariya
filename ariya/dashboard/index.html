<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ARIYA</title>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<!-- Minimal top bar -->
<div class="topbar">
  <div class="brand-min">A · R · I · Y · A</div>
  <div class="status" id="status">●</div>
</div>

<!-- The core: a single Jarvis-style AI orb -->
<div class="stage" id="stage">

  <!-- Agent constellation — orbits around the orb. Quiet by default; lights up when communicating. -->
  <svg id="constellation" class="constellation"></svg>

  <!-- The orb -->
  <div class="orb-wrap" id="orbWrap">
    <div class="orb">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="core"></div>
      <div class="orb-label">ARIYA</div>
    </div>
    <div class="hint" id="hint">— click to speak —</div>
  </div>

  <!-- Conversation strip -->
  <div class="conversation" id="conv"></div>

  <!-- Input -->
  <div class="composer">
    <input id="input" placeholder="ARIYA, what should we build today?" autocomplete="off" />
    <button id="send" title="Send">→</button>
  </div>

</div>

<!-- Slide-out details drawer (only shown when user asks for them) -->
<aside class="drawer" id="drawer">
  <div class="drawer-tabs">
    <button class="tab active" data-tab="agents">Agents</button>
    <button class="tab" data-tab="signals">Signals</button>
    <button class="tab" data-tab="projects">Projects</button>
    <button class="tab" data-tab="cost">Cost</button>
    <button class="close" id="closeDrawer">×</button>
  </div>
  <div class="drawer-body">
    <div class="tab-pane active" id="pane-agents"></div>
    <div class="tab-pane" id="pane-signals"></div>
    <div class="tab-pane" id="pane-projects"></div>
    <div class="tab-pane" id="pane-cost"></div>
  </div>
</aside>

<button class="drawer-toggle" id="openDrawer" title="System detail">⋯</button>

<script src="/static/app.js"></script>
</body>
</html>
